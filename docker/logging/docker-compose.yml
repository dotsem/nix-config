services:
  loki:
    image: grafana/loki:latest
    container_name: logging-loki
    ports:
      - "3100:3100"
    volumes:
      - /etc/logging/loki-config.yaml:/etc/loki/local-config.yaml
      - /logging/loki:/logging/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - logging-net

  promtail:
    image: grafana/promtail:latest
    container_name: logging-promtail
    volumes:
      - /etc/logging/promtail-config.yaml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    depends_on:
      - loki
    networks:
      - logging-net

  prometheus:
    image: prom/prometheus:latest
    container_name: logging-prometheus
    ports:
      - "9090:9090"
    volumes:
      - /logging/config/prometheus.yml:/etc/prometheus/prometheus.yml
      - /logging/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    depends_on:
      - loki
    networks:
      - logging-net

  grafana:
    image: grafana/grafana:latest
    container_name: logging-grafana
    ports:
      - "3000:3000"
    volumes:
      - /logging/grafana:/var/lib/grafana
      - /logging/config/grafana/provisioning:/etc/grafana/provisioning
      - /logging/config/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be provided}
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    networks:
      - logging-net

networks:
  logging-net:
    driver: bridge
